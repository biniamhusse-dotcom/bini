<div class="submit-btn-container clearfix">
    <span ng-switch="forwardActionKey">
        <span data-ng-switch-when="enterVisitDetails">
            <button type="submit" class="right confirm"
                ng-click="startVisitAction(); setSubmitSource('enterVisitDetails')"
                accesskey="{{ ::'REGISTRATION_ENTER_VISIT_DETAILS_ACCESS_KEY' | translate }}"
                ng-bind-html="::'REGISTRATION_LABEL_ENTER_VISIT' | translate">
            </button>
            <span>The patient started visit in <b>{{existedActiveVisits[0].visitType.name}}</b></span>
        </span>
        <span data-ng-switch-when="forwardAction">
                <button type="submit" class="right confirm"
                        ng-click="setSubmitSource('forwardAction')"
                        accesskey="{{ ::activeVisitConfig.shortcutKey | translate }}"
                        ng-bind-html="::activeVisitConfig.translationKey | translate">
                </button>
        </span>
        <span ng-if="::showStartVisitButton()" data-ng-switch-when="startVisit">
            <div class="retro-date-widget-wrapper fr">
                <div class="retro-date-widget-header fr">
                    <button type="submit" ng-click="startVisitAction()" class="start-visit-button right">Select Visit Type</button>
                </div>
            </div>
        </span>
    </span>
    <!-- <button type="submit" class="right submit-btn" ng-click="setSubmitSource('save')"
            accesskey="{{ ::'REGISTRATION_SAVE_ACCESS_KEY' | translate}}" ng-bind-html="::'REGISTRATION_LABEL_SAVE' | translate"></button> -->
</div>
