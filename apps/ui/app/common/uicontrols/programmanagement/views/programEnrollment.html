<div id="programEnrollmentContainer">
    <div class="program-enrollment-container">
        <div class="select-program-container form" style="background-color: #eee;">
            <button style="padding: 0%; width: 500%; text-align: left;">
                <a href="javascript:void(0)" class="section-title" toggle="allPrograms.showProgramSection" style="background-color: #669999; color: white; padding: 2px; width: 410%;">
                    <i class="fa fa-minus-square" ng-show="!allPrograms.showProgramSection"></i>
                    <i class="fa fa-plus-square" ng-show="allPrograms.showProgramSection"></i>
                    {{'PROGRAM_MANAGEMENT_SELECT_PROGRAM_KEY' | translate}}
                </a>
            </button>

            <form class="select-program-option form-field clearfix" single-submit="enrollPatient()"
                  ng-show="!allPrograms.showProgramSection">

                <article class="fl" style="width: 100%;">
                    <div class="field-attribute">
                        <label>{{'PROGRAM_MANAGEMENT_LABEL_PROGRAM' | translate}} : </label>
                    </div>
                    <div class="field-value">
                        <select ng-model="programSelected" ng-options="program.name for program in allPrograms"
                                data-ng-change="setWorkflowStates(programSelected); getSelectedProgram(programSelected);">
                            <option value="">{{'PROGRAM_MANAGEMENT_CHOOSE_PROGRAM_KEY' | translate}}</option>
                        </select>
                    </div>
                </article>

                <!-- <article class="fl">
                    <div ng-if="hasStates(programSelected)">
                        <div class="field-attribute">
                            <label> {{'PROGRAM_MANAGEMENT_LABEL_PROGRAM_STATE' | translate }} : </label>
                        </div>
                        <div class="field-value">
                            <select ng-model="$parent.workflowStateSelected"
                                    ng-options="state.concept.display for state in programWorkflowStates">
                                <option value="">{{'PROGRAM_MANAGEMENT_CHOOSE_STATE_KEY' | translate}}</option>
                            </select>
                        </div>
                    </div>
                </article> -->

                <article class="fl">
                    <div class="field-attribute">
                        <label>
                            {{'PROGRAM_MANAGEMENT_START_DATE_KEY' | translate}} :
                            <span class="asterick">*</span>
                        </label>
                    </div>
                    <div class="field-value">
                        <input type="date" max="{{today}}" ng-model="programEnrollmentDate" ng-required="true">
                    </div>
                </article> 

                <article class="fl" ng-repeat="attribute in programAttributeTypes | orderBy: 'attribute.sortWeight'" ng-if="isIncluded(attribute) && programSelected">
                    <br>
                    <span ng-hide="attribute.format != 'N/A'" style="background-color: #ccc; padding-left: 5px; padding-right: 5px; font-weight: lighter;" class="section-title">{{'PROGRAM_HEADER_LINE_KEY' | translate}}<span style="font-weight: bold;">{{attribute.description}}</span>{{attribute.headerLine}}</span>
                    <attribute-types target-model="patientProgramAttributes" attribute="attribute"
                                     is-form="true" ng-hide="attribute.format == 'N/A'"></attribute-types>
                </article>
                <br><br>

                <input class="fr" type="submit" value="{{'PROGRAM_MANAGEMENT_ENROLL_KEY' | translate}}"/>
            </form>
        </div>

        <div class="active-program-container clearfix" id="activePrograms" ng-show="hasPatientEnrolledToSomePrograms()" style="width: 300%;" ng-hide="programSelected">
            <h2 class="program-title" class="section-title" style="background-color: #669999; color: white; padding: 5px; width: 1235px;">
                {{'PROGRAM_MANAGEMENT_ACTIVE_PROGRAM_KEY' | translate}}
            </h2>
                <div ng-if="hasPatientEnrolledToSomePrograms()">
                <section class="active-program-tiles program-tiles"
                         ng-repeat="patientProgram in activePrograms"
                         ng-show="activePrograms.showProgramSection">
                            <ng-include src="'../common/uicontrols/programmanagement/views/programRow.html'"
                                ng-init="active=true"></ng-include>
                </section>
            </div>
    </div>

        <div class="inactive-program-container">
            <h2 class="program-title" style="background-color: #669999; color: white; padding: 5px; width: 1235px;">
                {{'PROGRAM_MANAGEMENT_PAST_PROGRAM_KEY' | translate}}
            </h2>
                <div ng-if="hasPatientAnyPastPrograms()">
                <section ng-repeat="patientProgram in endedPrograms" class="inactive-program-tiles program-tiles"
                         ng-show="endedPrograms.showProgramSection">
                    <ng-include src="'../common/uicontrols/programmanagement/views/pastProgramRow.html'"
                                ng-init="active=false"></ng-include>
                </section>
            </div>
    </div>

        <div class="observation-forms-container" ng-show="showFormsDisplayControl()">
            <mfe-next-ui-form-display-control
                host-data="observationFormData">
            </mfe-next-ui-form-display-control>
        </div>

    </div>
</div>
